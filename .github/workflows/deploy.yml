name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # handmatig triggeren via GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Installeer dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload naar Pages
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
